# =====================================================================
# Production RoadRunner config for the elections app
# Copy to /var/www/elections/.rr.yaml on the droplet (or keep separate
# and pass with: ./rr serve -c /var/www/elections/deploy/rr.production.yaml)
#
# Tuned for: 4 vCPU / 16 GB DO droplet, ~500 concurrent voters
# =====================================================================

version: "3"

rpc:
  listen: tcp://127.0.0.1:6001

server:
  command: "php artisan octane:worker --server=roadrunner --host=0.0.0.0 --port=8000 --rpc-port=6001"
  relay: "pipes"

http:
  address: "0.0.0.0:8000"
  middleware: ["static", "headers", "gzip"]

  pool:
    # 4 vCPU * 4 = 16 workers. Each holds ~100 MB → ~1.6 GB total RAM.
    num_workers: 16
    # Recycle each worker after this many requests to prevent memory leaks
    # accumulating in long-lived Octane processes.
    max_jobs: 1000
    # Timeout for a worker to handle one request (vote save with table lock
    # can be slow under burst — keep generous).
    supervisor:
      watch_tick: 1s
      ttl: 0s
      idle_ttl: 60s
      exec_ttl: 60s
      max_worker_memory: 256

  static:
    dir: "public"
    forbid: [".php", ".htaccess", ".env"]
    response:
      Cache-Control: "public, max-age=86400"

  headers:
    response:
      X-Powered-By: "Elections"
      X-Frame-Options: "SAMEORIGIN"
      X-Content-Type-Options: "nosniff"

logs:
  level: warn
  mode: production
  output: stdout
  err_output: stderr
  channels:
    http:
      level: warn
    server:
      level: error
